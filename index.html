<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p class="subtitle">Real-time weather information</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">Search</button>
            <button id="locationBtn" class="location-btn">📍 Use My Location</button>
        </div>

        <div id="loading" class="loading" style="display: none;">Loading...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="weatherContainer" class="weather-container">
            <div class="current-weather">
                <div class="city-info">
                    <h2 id="cityName"></h2>
                    <p id="description"></p>
                </div>
                <div class="temperature-section">
                    <div class="temperature" id="temperature"></div>
                    <div class="weather-icon" id="weatherIcon"></div>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-card">
                    <span class="label">Feels Like</span>
                    <span class="value" id="feelsLike"></span>
                </div>
                <div class="detail-card">
                    <span class="label">Humidity</span>
                    <span class="value" id="humidity"></span>
                </div>
                <div class="detail-card">
                    <span class="label">Wind Speed</span>
                    <span class="value" id="windSpeed"></span>
                </div>
                <div class="detail-card">
                    <span class="label">Pressure</span>
                    <span class="value" id="pressure"></span>
                </div>
                <div class="detail-card">
                    <span class="label">UV Index</span>
                    <span class="value" id="uvIndex"></span>
                </div>
                <div class="detail-card">
                    <span class="label">Visibility</span>
                    <span class="value" id="visibility"></span>
                </div>
            </div>

            <div class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div class="forecast-container" id="forecastContainer"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
